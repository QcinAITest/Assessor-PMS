<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QCI Performance Management System{% endblock %}</title>
    <!-- Dark mode applied before first paint to prevent flash -->
    <script>
        (function() {
            const saved = localStorage.getItem('qci_dark');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === '1' || (saved === null && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        qci: {
                            navy:    '#071B2F',
                            navymid: '#0D2F52',
                            gold:    '#B8901C',
                            blue:    '#1A6BBF',
                            bg:      '#F4F6F9',
                            surface: '#FFFFFF',
                            border:  '#DDE3EC',
                            textprimary: '#0A1628',
                            textmuted:   '#5B6B82',
                            // dark variants
                            darkbg:      '#0A1628',
                            darksurface: '#0F2337',
                            darkborder:  '#1A3352',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .star-filled { color: #B8901C; }
        .star-empty  { color: #d1d5db; }
        .dark .star-empty { color: #4B5563; }
        body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    </style>
</head>
<body class="h-full bg-[#F4F6F9] dark:bg-[#080F1A] transition-colors duration-200">

<!-- Auth guard: redirect to /login if no token -->
<script>
    (function() {
        const token = localStorage.getItem('qci_token');
        if (!token && window.location.pathname !== '/login') {
            window.location.href = '/login';
        }
    })();
    window.__qciUser = (function() {
        try { return JSON.parse(localStorage.getItem('qci_user') || '{}'); } catch { return {}; }
    })();
</script>

<div class="min-h-full">
    <!-- Navigation -->
    <nav class="bg-[#071B2F] border-b border-[#0D2F52] fixed top-0 left-0 right-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-14">
                <!-- Logo + nav links -->
                <div class="flex items-center space-x-6 min-w-0">
                    <a href="/" class="flex items-center space-x-2.5 flex-shrink-0">
                        <div class="w-7 h-7 rounded flex items-center justify-center flex-shrink-0" style="background: #B8901C;">
                            <span class="text-white font-bold text-sm leading-none">Q</span>
                        </div>
                        <div class="hidden sm:flex flex-col leading-none">
                            <span class="text-white font-semibold text-sm tracking-wide">QCI</span>
                            <span class="text-[#5B6B82] text-xs">Performance Management</span>
                        </div>
                    </a>
                    <a id="nav-sysadmin" href="/sysadmin"
                       class="hidden text-[#5B6B82] hover:text-white text-sm font-medium transition-colors whitespace-nowrap">
                        System Admin
                    </a>
                </div>

                <!-- Right side: dark mode toggle + user info + logout -->
                <div class="flex items-center space-x-1 sm:space-x-3">
                    <!-- Dark mode toggle -->
                    <button id="dark-toggle" onclick="toggleDark()"
                            class="w-8 h-8 flex items-center justify-center rounded text-[#5B6B82] hover:text-white hover:bg-[#0D2F52] transition flex-shrink-0"
                            title="Toggle dark mode">
                        <svg id="icon-moon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                        <svg id="icon-sun" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                    </button>

                    <!-- User info -->
                    <div id="nav-user" class="hidden items-center space-x-2.5">
                        <div class="text-right hidden sm:block">
                            <p id="nav-user-name" class="text-white text-xs font-medium leading-tight"></p>
                            <p id="nav-user-role" class="text-[#5B6B82] text-xs leading-tight"></p>
                        </div>
                        <div id="nav-user-avatar"
                             class="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0"
                             style="background: #B8901C; outline: 2px solid #B8901C; outline-offset: 1px;">
                        </div>
                    </div>
                    <button onclick="logout()"
                            class="text-[#5B6B82] hover:text-white text-xs px-2 py-1.5 rounded hover:bg-[#0D2F52] transition whitespace-nowrap">
                        Sign out
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content — offset for fixed navbar -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 pt-20">
        {% block content %}{% endblock %}
    </main>
</div>

<script>
    // Populate nav from stored user
    (function() {
        const u = window.__qciUser;
        if (u && u.full_name) {
            const nameEl   = document.getElementById('nav-user-name');
            const roleEl   = document.getElementById('nav-user-role');
            const avatarEl = document.getElementById('nav-user-avatar');
            const userDiv  = document.getElementById('nav-user');
            const sysLink  = document.getElementById('nav-sysadmin');
            if (nameEl)   nameEl.textContent  = u.full_name;
            if (roleEl)   roleEl.textContent  = u.role === 'SYSTEM_ADMIN' ? 'System Admin' : 'Board Admin';
            if (avatarEl) avatarEl.textContent = (u.full_name || '?')[0].toUpperCase();
            if (userDiv)  userDiv.classList.replace('hidden', 'flex');
            if (sysLink && u.role === 'SYSTEM_ADMIN') sysLink.classList.remove('hidden');
        }
    })();

    // Dark mode toggle
    function toggleDark() {
        const html = document.documentElement;
        const isDark = html.classList.toggle('dark');
        localStorage.setItem('qci_dark', isDark ? '1' : '0');
        document.getElementById('icon-moon').classList.toggle('hidden', isDark);
        document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
    }
    // Sync icon with current state on load
    (function() {
        const isDark = document.documentElement.classList.contains('dark');
        document.getElementById('icon-moon').classList.toggle('hidden', isDark);
        document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
    })();

    function logout() {
        localStorage.removeItem('qci_token');
        localStorage.removeItem('qci_user');
        window.location.href = '/login';
    }

    const api = {
        _headers() {
            const token = localStorage.getItem('qci_token');
            return {
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
            };
        },
        async _handle(res) {
            if (res.status === 401) { logout(); return; }
            if (!res.ok) {
                const body = await res.text();
                let msg = body;
                try { const j = JSON.parse(body); msg = j.detail || body; } catch (_) {}
                const err = new Error(msg);
                err.status = res.status;
                throw err;
            }
            if (res.status === 204) return null;
            return res.json();
        },
        async get(url)         { return this._handle(await fetch(url, { headers: this._headers() })); },
        async post(url, data)  { return this._handle(await fetch(url, { method: 'POST',   headers: this._headers(), body: JSON.stringify(data) })); },
        async put(url, data)   { return this._handle(await fetch(url, { method: 'PUT',    headers: this._headers(), body: JSON.stringify(data) })); },
        async patch(url, data) { return this._handle(await fetch(url, { method: 'PATCH',  headers: this._headers(), body: JSON.stringify(data) })); },
        async del(url)         { return this._handle(await fetch(url, { method: 'DELETE', headers: this._headers() })); },
    };

    const currentUser  = window.__qciUser || {};
    const isSysAdmin   = currentUser.role === 'SYSTEM_ADMIN';
    const isBoardAdmin = currentUser.role === 'BOARD_ADMIN';

    function starHtml(rating, max = 5) {
        let html = '';
        for (let i = 1; i <= max; i++) {
            html += i <= rating
                ? '<span class="star-filled text-lg">&#9733;</span>'
                : '<span class="star-empty text-lg">&#9733;</span>';
        }
        return html;
    }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
